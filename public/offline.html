<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Jeda Baca</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2rem;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }

    .button {
      display: inline-block;
      background: linear-gradient(135deg, #d4af37 0%, #e5c158 100%);
      color: #1a1a2e;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 250ms ease;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      letter-spacing: 0.3px;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
    }

    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 8px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">📡</span>
    <h1>Anda Sedang Offline</h1>
    <p>Koneksi internet Anda terputus. Beberapa fitur mungkin tidak tersedia saat ini.</p>
    <a href="/" class="button">Kembali ke Beranda</a>
    <div class="status">
      Jeda Baca akan secara otomatis tersinkronisasi ketika koneksi Anda kembali.
    </div>
  </div>
</body>
</html>
